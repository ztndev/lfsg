name: Delete Removed Files from LFS

on:
  push:
    paths:
      - "tracked-files.json"
  workflow_dispatch:

jobs:
  delete-removed-files:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Git LFS
        run: git lfs install

      - name: Configure Git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install jq
        run: sudo apt-get install -y jq > /dev/null 2>&1

      - name: Detect deleted entries
        id: detect
        run: |
          TRACKED_PATHS=$(jq -r '.files[].path' tracked-files.json)

          PREV_PATHS=$(git show HEAD~1:tracked-files.json 2>/dev/null \
            | jq -r '.files[].path' 2>/dev/null || echo "")

          if [ -z "$PREV_PATHS" ]; then
            echo "⚠️  No previous tracked-files.json found, nothing to compare."
            echo "count=0" >> $GITHUB_OUTPUT
            exit 0
          fi

          TO_DELETE=$(comm -23 \
            <(echo "$PREV_PATHS" | sort) \
            <(echo "$TRACKED_PATHS" | sort))

          if [ -z "$TO_DELETE" ]; then
            echo "✅ No files removed from tracked-files.json."
            echo "count=0" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "──────────────── Files to delete ────────────────"
          echo "$TO_DELETE"
          echo "─────────────────────────────────────────────────"

          echo "$TO_DELETE" > /tmp/to-delete.txt
          COUNT=$(echo "$TO_DELETE" | wc -l)
          echo "count=$COUNT" >> $GITHUB_OUTPUT

      - name: Delete files
        if: steps.detect.outputs.count > 0
        run: |
          while IFS= read -r FILE_PATH || [ -n "$FILE_PATH" ]; do
            FILE_PATH=$(echo "$FILE_PATH" | xargs)
            [ -z "$FILE_PATH" ] && continue

            if [ -f "$FILE_PATH" ]; then
              echo "🗑  Deleting: $FILE_PATH"
              git rm "$FILE_PATH"
              echo "✅ Deleted: $FILE_PATH"
            else
              echo "⚠️  Already gone (skipping): $FILE_PATH"
            fi

          done < /tmp/to-delete.txt

          find files/ -type d -empty ! -name ".gitkeep" -exec sh -c '
            for dir; do
              touch "$dir/.gitkeep"
              echo "📁 Restored .gitkeep in empty dir: $dir"
            done
          ' sh {} +

      - name: Purge deleted files from LFS
        if: steps.detect.outputs.count > 0
        run: |
          git lfs prune --verify-remote 2>/dev/null || true

      - name: Commit and push
        if: steps.detect.outputs.count > 0
        run: |
          git add -A

          if git diff --cached --quiet; then
            echo "✅ Nothing to commit."
          else
            COUNT=$(wc -l < /tmp/to-delete.txt)
            git commit -m "chore(lfs): delete $COUNT removed file(s) [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          if [ -f /tmp/to-delete.txt ]; then
            COUNT=$(wc -l < /tmp/to-delete.txt)
            echo "### 🗑 Deletion Summary" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**$COUNT file(s) deleted:**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            while IFS= read -r FILE_PATH; do
              echo "- \`$FILE_PATH\`" >> $GITHUB_STEP_SUMMARY
            done < /tmp/to-delete.txt
          else
            echo "### ✅ Nothing to delete" >> $GITHUB_STEP_SUMMARY
          fi
